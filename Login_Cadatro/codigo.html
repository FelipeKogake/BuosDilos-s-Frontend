<!DOCTYPE html>
<html lang="pt-BR"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/codigo.css">
    <title>Digite seu Código</title>
</head>
<body>
    <!-- estrelas de fundo (atrás) -->
    <img src="Assets/estrelas-azul.png" class="estrelas estrelas--back" aria-hidden="true"/>

    <div class="personagem" aria-hidden="true">
        <div class="personagem-sombra"></div>
        <img src="Assets/personagem-codigo.png" alt="Personagem" class="personagemImg" />
    </div>

    <div class="painel-codigo">
        <h1 class="titulo">Digite seu código</h1>

        <p class="descricao">Digite o código que enviamos ao email <strong>exemplo@intitutojef.org.br</strong> para trocar sua senha.</p>

        <form novalidate>
            <div class="campo">
                <label>Código recebido</label>
                <div class="codigo-inputs">
                    <input type="text" maxlength="1" class="input-codigo" />
                    <input type="text" maxlength="1" class="input-codigo" />
                    <input type="text" maxlength="1" class="input-codigo" />
                    <input type="text" maxlength="1" class="input-codigo" />
                    <input type="text" maxlength="1" class="input-codigo" />
                    <input type="text" maxlength="1" class="input-codigo" />
                </div>
            </div>
        </form>

        <a href="senha-alterada.html" class="btn-continuar">Continuar</a>

        <a href="login.html" class="voltar">Voltar para Login</a>
    </div>

    <!-- estrelas da frente -->
    <img src="Assets/estrelas-azul.png" class="estrelas estrelas--front" aria-hidden="true"/>

    <button class="btn-tema" onclick="toggleTema()">
        <img src="Assets/avatar-azul.png" alt="Trocar tema" />
    </button>

    <script src="JS/codigo.js"></script>
</body>
</html>
