<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/codigo.css">
    <title>Verificando link</title>
</head>
<body>
    <img src="Assets/codigo/estrelas-azul.png" class="estrelas estrelas--back" aria-hidden="true"/>

    <div class="personagem" aria-hidden="true">
        <div class="personagem-sombra"></div>
        <img src="Assets/codigo/personagem-azul.png" alt="Personagem" class="personagemImg" />
    </div>

    <main class="painel-codigo">
        <h1 class="titulo">Verificando seu link</h1>

        <p class="descricao">Aguarde um momento enquanto validamos seu código de recuperação.</p>

        <div class="status-mensagem status--carregando">Verificando...</div>

        <a href="login.html" class="voltar">Voltar para Login</a>
    </main>

    <img src="Assets/codigo/estrelas-azul.png" class="estrelas estrelas--front" aria-hidden="true"/>

    <button class="btn-tema" onclick="toggleTema()" aria-label="Trocar tema do site">
        <img src="Assets/avatar-azul.png" alt="Trocar tema" />
    </button>

    <script type="module" src="JS/codigo.js"></script>
</body>
</html>
