<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/cadastro-feito.css">
    <title>Cadastro Feito — Sistema</title>
</head>
<body>
    <img src="Assets/cadastro-feito/estrelas-azul.png" class="estrelas estrelas--back" aria-hidden="true" alt="" />

    <div class="personagem" aria-hidden="true">
        <img src="Assets/cadastro-feito/personagem-azul.png" alt="" class="personagemImg" />
    </div>

    <main class="conteudo">
        <h1 class="titulo">Cadastro feito com sucesso</h1>
        <button type="button" class="btn-voltar" onclick="voltarParaLogin()">Voltar para login</button>
    </main>

    <img src="Assets/cadastro-feito/estrelas-azul.png" class="estrelas estrelas--front" aria-hidden="true" alt="" />

    <button class="btn-tema" onclick="toggleTema()" aria-label="Trocar tema do site">
        <img src="Assets/avatar-azul.png" alt="" aria-hidden="true" />
    </button>

    <script src="JS/cadastro-feito.js"></script>
</body>
</html>
