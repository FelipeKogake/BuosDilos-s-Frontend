<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/recuperacao.css">
    <title>Recuperação de Senha</title>
</head>
<body>
    <!-- estrelas de fundo (atrás) -->
    <img src="Assets/recuperacao/estrelas-azul.png" class="estrelas estrelas--back" />

    <div class="personagem">
        <div class="personagem-sombra"></div>
        <img src="Assets/recuperacao/personagem-recuperacao.png" alt="Personagem" class="personagemImg" />
    </div>

    <div class="painel-recuperacao">
        <h1 class="titulo">Esqueceu a Senha?</h1>

        <p class="descricao">Digite seu email para enviarmos um código para sua recuperação de sua senha.</p>

        <div class="campo">
            <label for="email">Email de recuperação</label>
            <input type="email" id="email" placeholder="Email" />
        </div>

        <button class="btn-continuar">Continuar</button>

        <a href="login.html" class="voltar">Voltar para Login</a>
    </div>

    <!-- estrelas da frente -->
    <img src="Assets/recuperacao/estrelas-azul.png" class="estrelas estrelas--front" />

    <button class="btn-tema" onclick="toggleTema()">
        <img src="Assets/avatar-azul.png" alt="Trocar tema" />
    </button>

    <script src="JS/recuperacao.js"></script>
</body>
</html>
